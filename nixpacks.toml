# Railway (Nixpacks): Supabase JS 2.103+ Node 20+ istiyor; build’de 18 seçilmesin.
# DMO: index.js `spawn('python3', ['app.py'])` kullanıyor — imajda python3 olsun.
[variables]
NIXPACKS_NODE_VERSION = "20"

# Dikkat: `nixPkgs` tek başına yazılırsa varsayılan Node kurulumunu EZer.
# Hem Node 20 hem Python 3 birlikte olmalı; yoksa `npm ci` → "npm: command not found".
[phases.setup]
nixPkgs = ["nodejs_20", "python3"]
